kind = "web"
previewPath = "/"
title = "Vibe Coding Overlay Builder"
version = "1.0.0"
id = "artifacts/vibe-overlay"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25561

[services.development]
run = "pnpm --filter @workspace/vibe-overlay run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vibe-overlay", "run", "build" ]
publicDir = "artifacts/vibe-overlay/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25561"
BASE_PATH = "/"
